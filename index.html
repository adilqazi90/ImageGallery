<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A production-ready responsive image gallery with filtering, lightbox, and dark/light mode."
    />
    <title>Qazi — Image Gallery</title>

    <!-- Google Fonts: Playfair Display + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ░░ HEADER ░░ -->
    <header class="site-header" role="banner">
      <div class="header-inner">
        <div class="logo" aria-label="Lumière Gallery">
          <span class="logo-mark">✦</span>
          <span class="logo-text">Qazi</span>
        </div>

        <nav class="header-controls" aria-label="Gallery controls">
          <!-- Search -->
          <div class="search-wrap" role="search">
            <label for="search-input" class="sr-only">Search images</label>
            <input
              id="search-input"
              class="search-input"
              type="search"
              placeholder="Search images…"
              aria-label="Search images"
              autocomplete="off"
            />
            <span class="search-icon" aria-hidden="true">⌕</span>
          </div>

          <!-- Theme toggle -->
          <button
            class="theme-toggle"
            id="theme-toggle"
            aria-label="Toggle dark/light mode"
            title="Toggle dark/light mode"
          >
            <span class="theme-icon" aria-hidden="true">◐</span>
          </button>
        </nav>
      </div>
    </header>

    <!-- ░░ HERO ░░ -->
    <section class="hero" aria-label="Gallery introduction">
      <p class="hero-eyebrow">Curated Collection</p>
      <h1 class="hero-title">Every frame<br /><em>tells a story.</em></h1>
      <p class="hero-subtitle">
        Explore a hand-picked selection of photography spanning architecture,
        nature, street, and abstract worlds.
      </p>
    </section>

    <!-- ░░ FILTER BAR ░░ -->
    <section class="filter-section" aria-label="Filter by category">
      <div class="filter-bar" role="tablist" aria-label="Image categories">
        <!-- Populated by JS -->
      </div>
      <div class="gallery-meta" aria-live="polite" aria-atomic="true">
        <span id="image-count" class="image-count"></span>
      </div>
    </section>

    <!-- ░░ GALLERY GRID ░░ -->
    <main id="gallery-grid" class="gallery-grid" aria-label="Image gallery">
      <!-- Skeleton loaders shown initially -->
      <div class="skeleton-grid" id="skeleton-grid" aria-hidden="true">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </main>

    <!-- ░░ EMPTY STATE ░░ -->
    <div class="empty-state" id="empty-state" hidden aria-live="polite">
      <span class="empty-icon" aria-hidden="true">◎</span>
      <p class="empty-text">No images match your search.</p>
      <button class="btn-reset" id="btn-reset">Clear search</button>
    </div>

    <!-- ░░ LIGHTBOX ░░ -->
    <div
      class="lightbox"
      id="lightbox"
      role="dialog"
      aria-modal="true"
      aria-label="Image preview"
      hidden
    >
      <!-- Backdrop -->
      <div
        class="lightbox-backdrop"
        id="lightbox-backdrop"
        aria-hidden="true"
      ></div>

      <!-- Panel -->
      <div class="lightbox-panel" role="document">
        <!-- Close -->
        <button
          class="lb-btn lb-close"
          id="lb-close"
          aria-label="Close image preview"
          title="Close (Esc)"
        >
          ✕
        </button>

        <!-- Previous -->
        <button
          class="lb-btn lb-prev"
          id="lb-prev"
          aria-label="Previous image"
          title="Previous (←)"
        >
          ←
        </button>

        <!-- Image wrapper -->
        <div class="lb-image-wrap">
          <div
            class="lb-loader"
            id="lb-loader"
            aria-label="Loading image"
            role="status"
          >
            <span class="loader-ring"></span>
          </div>
          <img id="lb-img" class="lb-img" src="" alt="" draggable="false" />
        </div>

        <!-- Next -->
        <button
          class="lb-btn lb-next"
          id="lb-next"
          aria-label="Next image"
          title="Next (→)"
        >
          →
        </button>

        <!-- Caption -->
        <div class="lb-caption">
          <span id="lb-title" class="lb-title"></span>
          <span id="lb-category" class="lb-category"></span>
          <span id="lb-counter" class="lb-counter"></span>
        </div>
      </div>
    </div>

    <!-- ░░ FOOTER ░░ -->
    <footer class="site-footer" role="contentinfo">
      <p>
        Built with ✦ for <strong>CodeAlpha</strong> Frontend Internship · Task 1
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
